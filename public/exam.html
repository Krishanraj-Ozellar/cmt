<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exam Portal</title>

<style>

*{
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  margin:0;

  -webkit-user-select:none;
  -moz-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

#examScreen,
#res{
  background:#fff;
  padding:30px;
  border-radius:10px;
  max-width:620px;
  margin:auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

#qtxt{
  font-size:18px;
  margin-bottom:20px;
  line-height:1.5;
}

.opt{
  padding:12px 16px;
  margin:8px 0;
  border:2px solid #ddd;
  cursor:pointer;
  border-radius:8px;
  transition:all 0.15s;
  font-size:15px;
}

.opt:hover{
  border-color:#3b82f6;
  background:#eff6ff;
}

.opt.sel{
  background:#3b82f6;
  color:#fff;
  border-color:#3b82f6;
}

.nav-btns{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.nav-btns button,
#submitBtn{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

.nav-btns button{
  background:#e5e7eb;
  color:#010c5d;
}

.nav-btns button:hover{
  background:#d1d5db;
}

#submitBtn{
  display:block;
  margin-top:20px;
  background:#ef4444;
  color:white;
  width:100%;
  padding:12px;
  font-size:16px;
}

#submitBtn:hover{
  background:#dc2626;
}

#timerBox{
  text-align:right;
  font-size:18px;
  font-weight:bold;
  color:#ef4444;
  margin-bottom:10px;
}

#timerBox.warning{
  color:#f97316;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.4;}
}

#progressBar{
  height:6px;
  background:#e5e7eb;
  border-radius:3px;
  margin-bottom:20px;
}

#progressFill{
  height:100%;
  background:#3b82f6;
  border-radius:3px;
  transition:width 0.3s;
}

#res h2{
  color:#1e3a5f;
}

#res .stat-row{
  display:flex;
  gap:15px;
  margin-top:15px;
}

#res .stat-box{
  flex:1;
  padding:15px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
}

.stat-box.correct{
  background:#dcfce7;
  color:#166534;
}

.stat-box.wrong{
  background:#fee2e2;
  color:#991b1b;
}

.stat-box.skipped{
  background:#fef9c3;
  color:#854d0e;
}

#scoreCircle{
  width:120px;
  height:120px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  color:white;
  margin:20px auto;
}

#kickedOverlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:9999;
  justify-content:center;
  align-items:center;
}

#kickedOverlay.show{
  display:flex;
}

#kickedBox{
  background:white;
  padding:40px;
  border-radius:12px;
  text-align:center;
  max-width:380px;
}

#kickedBox h3{
  color:#ef4444;
  margin-bottom:10px;
}

#cameraBox{
  position:fixed;
  bottom:10px;
  right:10px;
  width:180px;
  height:130px;
  background:#000;
  border:3px solid #3b82f6;
  border-radius:10px;
  overflow:hidden;
  z-index:99999;
  display:none;
}

#cameraBox video{
  width:100%;
  height:100%;
  object-fit:cover;
}

</style>
</head>

<body>

<div id="kickedOverlay">
  <div id="kickedBox">
    <h3>⚠️ Session Expired</h3>
    <p>Your account was logged in from another device or browser.</p>
    <button onclick="goToLogin()">Back to Login</button>
  </div>
</div>

<div id="res" style="display:none;">

  <h2>Exam Submitted Successfully</h2>

  <p><strong>Company:</strong> Ozellar Marine</p>
  <p><strong>Name:</strong> <span id="rname"></span></p>
  <p><strong>Rank:</strong> <span id="rrank"></span></p>

  <div id="scoreCircle">0%</div>

  <div class="stat-row">

    <div class="stat-box correct">
      Correct
      <div id="rcorrect">0</div>
    </div>

    <div class="stat-box wrong">
      Wrong
      <div id="rwrong">0</div>
    </div>

    <div class="stat-box skipped">
      Skipped
      <div id="rskipped">0</div>
    </div>

  </div>

  <h3 id="rmsg" style="margin-top:20px;"></h3>

</div>

<div id="examScreen">

  <div id="timerBox">
    ⏱ <span id="timeLeft">--:--</span>
  </div>

  <div id="progressBar">
    <div id="progressFill" style="width:0%"></div>
  </div>

  <h2 id="qtxt">Loading...</h2>

  <div id="optsEl"></div>

  <div class="nav-btns">
    <button onclick="go(-1)">◀ Prev</button>
    <button onclick="go(1)">Next ▶</button>
  </div>

  <button id="submitBtn" onclick="confirmSubmit()">
    Submit Exam
  </button>

</div>

<div id="cameraBox">
  <video id="cameraFeed" autoplay muted playsinline></video>
</div>

<script>

document.addEventListener("DOMContentLoaded", async function(){

// QUESTIONS
const questionBank = {

  master:[
    {
      q:"What is your fav Team?",
      opts:["RCB","CSK","MI","KKR"],
      ans:0
    }
  ]

};

// STATE
let questions = [];
let answers = [];
let cur = 0;

let correct = 0;
let wrong = 0;
let skipped = 0;

let totalTime = 3600;

let timerInterval;
let pingInterval;

let submitted = false;
let user = null;

let warningCount = 0;
const MAX_WARNINGS = 3;

// HELPERS
function el(id){
  return document.getElementById(id);
}

function normalizeRank(raw){
  return (raw || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g,"_")
    .replace(/^_+|_+$/g,"");
}

function getAuthHeaders(){
  return {
    "Content-Type":"application/json",
    "x-session-token":user.token || "",
    "x-user-id":String(user.id || "")
  };
}

window.goToLogin = function(){
  sessionStorage.clear();
  window.location.href = "login.html";
};

// SHUFFLE
function shuffleArray(arr){

  for(let i=arr.length-1;i>0;i--){

    const j = Math.floor(Math.random() * (i+1));

    [arr[i],arr[j]] = [arr[j],arr[i]];

  }

}

function shuffleQuestions(){

  shuffleArray(questions);

  questions.forEach(q=>{

    const correctAnswer = q.opts[q.ans];

    shuffleArray(q.opts);

    q.ans = q.opts.indexOf(correctAnswer);

  });

}

// ANTI COPY
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("copy",e=>e.preventDefault());

document.addEventListener("cut",e=>e.preventDefault());

document.addEventListener("paste",e=>e.preventDefault());

document.addEventListener("dragstart",e=>e.preventDefault());

// BLOCK KEYS
document.addEventListener("keydown",function(e){

  if(
    (e.ctrlKey || e.metaKey) &&
    ["c","v","x","u","s","a","p"].includes(e.key.toLowerCase())
  ){
    e.preventDefault();
  }

  if(e.key === "F12"){
    e.preventDefault();
  }

  if(
    e.ctrlKey &&
    e.shiftKey &&
    ["I","J","C"].includes(e.key.toUpperCase())
  ){
    e.preventDefault();
  }

});

// FULLSCREEN
async function enterFullscreen(){

  const elem = document.documentElement;

  if(elem.requestFullscreen){
    await elem.requestFullscreen();
  }

}

document.addEventListener("fullscreenchange",()=>{

  if(!document.fullscreenElement && !submitted){

    cheatingDetected("Fullscreen exited");

  }

});

// TAB SWITCH
document.addEventListener("visibilitychange",()=>{

  if(document.hidden && !submitted){

    cheatingDetected("Tab switch detected");

  }

});

// WINDOW BLUR
window.addEventListener("blur",()=>{

  if(!submitted){

    cheatingDetected("Window focus lost");

  }

});

// CHEATING DETECTION
function cheatingDetected(reason){

  warningCount++;

  alert(`${reason}\nWarning ${warningCount}/${MAX_WARNINGS}`);

  if(warningCount >= MAX_WARNINGS){

    alert("Exam auto submitted due to cheating.");

    submit();

  }else{

    enterFullscreen();

  }

}

// CAMERA
async function startCamera(){

  try{

    const stream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:false
    });

    const video = el("cameraFeed");

    video.srcObject = stream;

    el("cameraBox").style.display = "block";

  }catch(err){

    alert("Camera permission required");

  }

}

// SESSION PING
function startPing(){

  pingInterval = setInterval(async()=>{

    if(submitted){
      clearInterval(pingInterval);
      return;
    }

    try{

      const res = await fetch("http://localhost:3005/api/ping",{
        headers:getAuthHeaders()
      });

      if(res.status === 401){

        clearInterval(pingInterval);
        clearInterval(timerInterval);

        el("kickedOverlay").classList.add("show");

      }

    }catch(e){

      console.warn("Ping failed:",e.message);

    }

  },10000);

}

// INIT
async function init(){

  user = JSON.parse(sessionStorage.getItem("examUser"));

  if(!user || !user.id || !user.token){

    alert("No valid session found.");

    goToLogin();

    return;

  }

  const rankKey = normalizeRank(user.rank);

  questions = questionBank[rankKey] || [];

  if(!questions.length){

    el("qtxt").textContent =
      `No questions found for rank "${user.rank}"`;

    return;

  }

  shuffleQuestions();

  answers = new Array(questions.length).fill(null);

  renderQ();

  startTimer();

  startPing();

  await enterFullscreen();

  await startCamera();

}

// RENDER
function renderQ(){

  const q = questions[cur];

  el("qtxt").textContent =
    `Q${cur+1} of ${questions.length}: ${q.q}`;

  el("progressFill").style.width =
    ((cur+1)/questions.length*100)+"%";

  const box = el("optsEl");

  box.innerHTML = "";

  q.opts.forEach((opt,i)=>{

    const div = document.createElement("div");

    div.className =
      "opt" + (answers[cur] === i ? " sel" : "");

    div.textContent = opt;

    div.onclick = ()=>{

      answers[cur] = i;

      renderQ();

    };

    box.appendChild(div);

  });

  if(cur === questions.length-1){

    el("submitBtn").style.display = "block";

  }else{

    el("submitBtn").style.display = "none";

  }

}

// NAVIGATION
window.go = function(d){

  const n = cur + d;

  if(n >=0 && n < questions.length){

    cur = n;

    renderQ();

  }

};

// TIMER
function startTimer(){

  updateTimerDisplay();

  timerInterval = setInterval(()=>{

    totalTime--;

    updateTimerDisplay();

    if(totalTime <= 60){

      el("timerBox").classList.add("warning");

    }

    if(totalTime <= 0){

      clearInterval(timerInterval);

      submit();

    }

  },1000);

}

function updateTimerDisplay(){

  const m = String(
    Math.floor(totalTime/60)
  ).padStart(2,"0");

  const s = String(
    totalTime % 60
  ).padStart(2,"0");

  el("timeLeft").textContent = `${m}:${s}`;

}

// SUBMIT
window.confirmSubmit = function(){

  if(confirm("Submit exam?")){

    submit();

  }

};

async function submit(){

  if(submitted) return;

  submitted = true;

  clearInterval(timerInterval);
  clearInterval(pingInterval);

  correct = 0;
  wrong = 0;
  skipped = 0;

  questions.forEach((q,i)=>{

    if(answers[i] === null){

      skipped++;

    }else if(answers[i] === q.ans){

      correct++;

    }else{

      wrong++;

    }

  });

  const score = Math.round(
    (correct / questions.length) * 100
  );

  const name = user.name || "N/A";
  const rank = user.rank || "N/A";

  try{

    const res = await fetch(
      "http://localhost:3005/api/result",
      {
        method:"POST",
        headers:getAuthHeaders(),
        body:JSON.stringify({
          user_id:user.id,
          user_name:name,
          rank,
          score,
          correct,
          wrong,
          skipped
        })
      }
    );

    if(res.status === 401){

      console.warn("Session expired during submit");

    }

  }catch(err){

    console.error("Result save failed:",err);

  }

  el("examScreen").style.display = "none";
  el("res").style.display = "block";

  el("rname").textContent = name;
  el("rrank").textContent = rank;

  el("rcorrect").textContent = correct;
  el("rwrong").textContent = wrong;
  el("rskipped").textContent = skipped;

  const circle = el("scoreCircle");

  circle.textContent = score + "%";

  circle.style.background =
    score >= 50 ? "#22c55e" : "#ef4444";

  el("rmsg").textContent =
    score >= 50
    ? "🎉 Congratulations! You have PASSED the exam."
    : "❌ You did not meet the passing score.";

  sessionStorage.removeItem("examUser");

}

// START
init();

});

</script>

</body>
</html>
