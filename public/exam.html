<title>Exam Portal</title>
<style>

  #qtxt { font-size: 18px; margin-bottom: 20px; line-height: 1.5; }
  .opt { padding: 12px 16px; margin: 8px 0; border: 2px solid #ddd; cursor: pointer; border-radius: 8px; transition: all 0.15s; font-size: 15px; }
  .opt:hover { border-color: #3b82f6; background: #eff6ff; }
  .opt.sel { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .nav-btns { margin-top: 20px; display: flex; gap: 10px; }
  .nav-btns button, #submitBtn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; }
  .nav-btns button { background: #e5e7eb; color: #010c5d; }
  .nav-btns button:hover { background: #d1d5db; }
  #submitBtn { display: none; margin-top: 20px; background: #ef4444; color: white; width: 100%; padding: 12px; font-size: 16px; }
  #submitBtn:hover { background: #dc2626; }
  #timerBox { text-align: right; font-size: 18px; font-weight: bold; color: #ef4444; margin-bottom: 10px; }
  #timerBox.warning { color: #f97316; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  #progressBar { height: 6px; background: #e5e7eb; border-radius: 3px; margin-bottom: 20px; }
  #progressFill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width 0.3s; }
  #res h2 { color: #1e3a5f; }
  .stat-row { display: flex; gap: 15px; margin-top: 15px; }
  .stat-box { flex: 1; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; }
  .correct { background: #dcfce7; color: #166534; }
  .wrong { background: #fee2e2; color: #991b1b; }
  .skipped { background: #fef9c3; color: #854d0e; }
  #scoreCircle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: white; margin: 20px auto; }
  #kickedOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 9999; justify-content: center; align-items: center; }
  #kickedOverlay.show { display: flex; }
  #kickedBox { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 380px; }
  #camPreview { position: fixed; bottom: 10px; right: 10px; width: 180px; height: 120px; border: 2px solid #3b82f6; border-radius: 10px; background: black; z-index: 999; }
  #faceOverlay { position: fixed; bottom: 10px; right: 10px; width: 180px; height: 120px; z-index: 1000; pointer-events: none; }
</style>
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

let questions = [];
let answers = [];
let cur = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let totalTime = 3600;
let timerInterval;
let pingInterval;
let submitted = false;
let user = null;
let warningCount = 0;

function el(id) { return document.getElementById(id); }

function normalizeRank(raw) {
  return (raw || "").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
}

function getAuthHeaders() {
  return {
    "Content-Type": "application/json",
    "x-session-token": user.token || "",
    "x-user-id": String(user.id || "")
  };
}

async function startCamera() {
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri("https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model");
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri("https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model");
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false });
    const video = el("camPreview");
    video.srcObject = stream;
    await video.play();
    video.width = 180;
    video.height = 120;
    const canvas = document.createElement("canvas");
    canvas.id = "faceOverlay";
    canvas.width = 180;
    canvas.height = 120;
    document.body.appendChild(canvas);
    const displaySize = { width: 180, height: 120 };
    faceapi.matchDimensions(canvas, displaySize);
    canvas.style.display = "block";
    video.onloadedmetadata = () => {
      const ctx = canvas.getContext("2d");
      let noFaceCount = 0;
      let multiFaceCount = 0;
      let awayCount = 0;
      async function detectFace() {
        if (submitted) return;
        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 })).withFaceLandmarks(true);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, 180, 24);
        if (detections.length === 0) {
          noFaceCount++;
          ctx.fillStyle = "red";
          ctx.font = "bold 13px Arial";
          ctx.fillText("NO FACE DETECTED", 8, 16);
          if (noFaceCount >= 40) { alert("Face not detected."); submit(); return; }
        } else if (detections.length > 1) {
          multiFaceCount++;
          ctx.fillStyle = "yellow";
          ctx.font = "bold 13px Arial";
          ctx.fillText("MULTIPLE FACES", 8, 16);
          if (multiFaceCount >= 20) { alert("Multiple persons detected."); submit(); return; }
        } else {
          noFaceCount = 0;
          multiFaceCount = 0;
          const resized = faceapi.resizeResults(detections, displaySize);
          faceapi.draw.drawDetections(canvas, resized);
          const detection = resized[0];
          const box = detection.detection.box;
          const centerX = box.x + box.width / 2;
          const centerY = box.y + box.height / 2;
          const faceCentered = centerX > 50 && centerX < 130 && centerY > 25 && centerY < 95;
          const landmarks = detection.landmarks;
          faceapi.draw.drawFaceLandmarks(canvas, resized);
          const leftEye = landmarks.getLeftEye();
          const rightEye = landmarks.getRightEye();
          const eyeAvgX = [...leftEye, ...rightEye].reduce((a, p) => a + p.x, 0) / (leftEye.length + rightEye.length);
          let direction = "CENTER";
          if (eyeAvgX < centerX - 10) direction = "LEFT";
          else if (eyeAvgX > centerX + 10) direction = "RIGHT";
          ctx.fillStyle = "#00ff00";
          ctx.font = "bold 12px Arial";
          ctx.fillText("FACE VERIFIED", 8, 16);
          ctx.fillStyle = "rgba(0,0,0,0.7)";
          ctx.fillRect(0, 95, 180, 25);
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 12px Arial";
          ctx.fillText("LOOKING: " + direction, 8, 112);
          if (!faceCentered) {
            awayCount++;
            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;
            ctx.strokeRect(box.x, box.y, box.width, box.height);
            if (awayCount >= 50) { alert("Please face the screen."); submit(); return; }
          } else { awayCount = 0; }
        }
        requestAnimationFrame(detectFace);
      }
      detectFace();
    };
  } catch (err) { console.error(err); alert("Camera permission required."); }
}

function startPing() {
  pingInterval = setInterval(async () => {
    if (submitted) return;
    try {
      const res = await fetch("/api/ping", { headers: getAuthHeaders() });
      if (res.status === 401) {
        clearInterval(timerInterval);
        clearInterval(pingInterval);
        el("kickedOverlay").classList.add("show");
      }
    } catch (e) { console.warn(e.message); }
  }, 10000);
}

function init() {
  user = JSON.parse(sessionStorage.getItem("examUser"));
  if (!user || !user.id || !user.token) { alert("No valid session found"); goToLogin(); return; }
  const rankKey = normalizeRank(user.rank);
  const rankMap = {
  
  able_boiled_seamnan: "able_bodied_seaman",
  able_bodied_seaman: "able_bodied_seaman",
  able_seaman: "able_bodied_seaman",
  ab: "able_bodied_seaman",
  abs: "able_bodied_seaman",
  ab_seaman: "able_bodied_seaman",

  electro_technical_officer: "electro_technical_officer",
  eto: "electro_technical_officer",
  e_t_o: "electro_technical_officer",

  tr_eo: "tr_eo",

  trainee_eto: "electro_technical_officer",
  eto_trainee: "electro_technical_officer"
};

  const finalRank = rankMap[rankKey] || rankKey;
  questions = questionBank[finalRank] || [];
  if (!questions.length) { el("qtxt").textContent = `No questions found for rank: ${user.rank}`; return; }
  answers = new Array(questions.length).fill(null);
  renderQ();
  startTimer();
  startPing();
  startCamera();
  if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }
}

function renderQ() {
  const q = questions[cur];
  if (!q) { el("qtxt").textContent = "Question not found"; return; }
  el("qtxt").textContent = `Q${cur + 1} of ${questions.length}: ${q.q}`;
  el("progressFill").style.width = ((cur + 1) / questions.length * 100) + "%";
  const box = el("optsEl");
  box.innerHTML = "";
  (q.opts || []).forEach((opt, i) => {
    const div = document.createElement("div");
    div.className = "opt" + (answers[cur] === i ? " sel" : "");
    div.textContent = opt;
    div.onclick = () => { answers[cur] = i; renderQ(); };
    box.appendChild(div);
  });
  el("submitBtn").style.display = cur === questions.length - 1 ? "block" : "none";
}

window.go = function(d) {
  const n = cur + d;
  if (n >= 0 && n < questions.length) { cur = n; renderQ(); }
};

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    totalTime--;
    updateTimerDisplay();
    if (totalTime <= 60) el("timerBox").classList.add("warning");
    if (totalTime <= 0) { clearInterval(timerInterval); submit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = String(Math.floor(totalTime / 60)).padStart(2, "0");
  const s = String(totalTime % 60).padStart(2, "0");
  el("timeLeft").textContent = `${m}:${s}`;
}

window.confirmSubmit = function() { if (confirm("Submit exam?")) submit(); };

async function submit() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);
  clearInterval(pingInterval);
  correct = 0; wrong = 0; skipped = 0;
  questions.forEach((q, i) => {
    if (answers[i] === null) skipped++;
    else if (answers[i] === q.ans) correct++;
    else wrong++;
  });
  const score = Math.round((correct / questions.length) * 100);
  const name = user.name || "N/A";
  const rank = user.rank || "N/A";
  try {
    await fetch("/api/result", {
      method: "POST",
      headers: getAuthHeaders(),
      body: JSON.stringify({ user_id: user.id, user_name: name, rank, score, correct, wrong, skipped })
    });
  } catch (err) { console.error(err); }
  el("examScreen").style.display = "none";
  el("res").style.display = "block";
  el("rname").textContent = name;
  el("rrank").textContent = rank;
  el("rcorrect").textContent = correct;
  el("rwrong").textContent = wrong;
  el("rskipped").textContent = skipped;
  const circle = el("scoreCircle");
  circle.textContent = score + "%";
  circle.style.background = score >= 50 ? "#22c55e" : "#ef4444";
  el("rmsg").textContent = score >= 50 ? "🎉 Congratulations! You PASSED." : "❌ You FAILED.";
  sessionStorage.removeItem("examUser");
}

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement && !submitted) { alert("Fullscreen required."); document.documentElement.requestFullscreen(); }
});
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("visibilitychange", () => {
  if (document.hidden && !submitted) {
    warningCount++;
    alert(`Warning ${warningCount}/3`);
    if (warningCount >= 3) { alert("Exam auto submitted."); submit(); }
  }
});
document.addEventListener("keydown", function(e) {
  if (e.key === "F12") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
  if (e.ctrlKey && e.key === "u") e.preventDefault();
  if (e.ctrlKey && e.key === "c") e.preventDefault();
});

init();

});
