<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exam Portal</title>

<style>
  * { box-sizing: border-box; }

  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 20px;
    margin: 0;
    user-select: none;
  }

  #examScreen, #res {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    max-width: 620px;
    margin: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  #qtxt {
    font-size: 18px;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .opt {
    padding: 12px 16px;
    margin: 8px 0;
    border: 2px solid #ddd;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s;
    font-size: 15px;
  }

  .opt:hover {
    border-color: #3b82f6;
    background: #eff6ff;
  }

  .opt.sel {
    background: #3b82f6;
    color: #fff;
    border-color: #3b82f6;
  }

  .nav-btns {
    margin-top: 20px;
    display: flex;
    gap: 10px;
  }

  .nav-btns button,
  #submitBtn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
  }

  .nav-btns button {
    background: #e5e7eb;
    color: #010c5d;
  }

  .nav-btns button:hover {
    background: #d1d5db;
  }

  #submitBtn {
    display: none;
    margin-top: 20px;
    background: #ef4444;
    color: white;
    width: 100%;
    padding: 12px;
    font-size: 16px;
  }

  #submitBtn:hover {
    background: #dc2626;
  }

  #timerBox {
    text-align: right;
    font-size: 18px;
    font-weight: bold;
    color: #ef4444;
    margin-bottom: 10px;
  }

  #timerBox.warning {
    color: #f97316;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.4; }
  }

  #progressBar {
    height: 6px;
    background: #e5e7eb;
    border-radius: 3px;
    margin-bottom: 20px;
  }

  #progressFill {
    height: 100%;
    background: #3b82f6;
    border-radius: 3px;
    transition: width 0.3s;
  }

  #res h2 { color: #1e3a5f; }

  .stat-row {
    display: flex;
    gap: 15px;
    margin-top: 15px;
  }

  .stat-box {
    flex: 1;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
  }

  .correct {
    background: #dcfce7;
    color: #166534;
  }

  .wrong {
    background: #fee2e2;
    color: #991b1b;
  }

  .skipped {
    background: #fef9c3;
    color: #854d0e;
  }

  #scoreCircle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: white;
    margin: 20px auto;
  }

  #kickedOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
    justify-content: center;
    align-items: center;
  }

  #kickedOverlay.show {
    display: flex;
  }

  #kickedBox {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    max-width: 380px;
  }

 #camPreview {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 180px;
  height: 120px;
  border: 2px solid #3b82f6;
  border-radius: 10px;
  background: black;
  z-index: 999;
}

#faceOverlay {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 180px;
  height: 120px;
  z-index: 1000;
  pointer-events: none;
}

</style>
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>

<body>

<!-- Session Expired -->
<div id="kickedOverlay">
  <div id="kickedBox">
    <h3>⚠️ Session Expired</h3>
    <p>Your account was logged in from another device.</p>
    <button onclick="goToLogin()">Back to Login</button>
  </div>
</div>

<!-- Result -->
<div id="res" style="display:none;">

  <h2>Exam Submitted Successfully</h2>

  <p><strong>Company:</strong> Ozellar Marine</p>
  <p><strong>Name:</strong> <span id="rname"></span></p>
  <p><strong>Rank:</strong> <span id="rrank"></span></p>

  <div id="scoreCircle">0%</div>

  <div class="stat-row">

    <div class="stat-box correct">
      Correct
      <div id="rcorrect">0</div>
    </div>

    <div class="stat-box wrong">
      Wrong
      <div id="rwrong">0</div>
    </div>

    <div class="stat-box skipped">
      Skipped
      <div id="rskipped">0</div>
    </div>

  </div>

  <h3 id="rmsg" style="margin-top:20px;"></h3>

</div>

<!-- Exam -->
<div id="examScreen">

  <div id="timerBox">
    ⏱ <span id="timeLeft">--:--</span>
  </div>

  <div id="progressBar">
    <div id="progressFill" style="width:0%"></div>
  </div>

  <h2 id="qtxt">Loading...</h2>

  <div id="optsEl"></div>

  <div class="nav-btns">
    <button onclick="go(-1)">◀ Prev</button>
    <button onclick="go(1)">Next ▶</button>
  </div>

  <button id="submitBtn" onclick="confirmSubmit()">
    Submit Exam
  </button>

</div>

<!-- Camera -->
<video id="camPreview" autoplay muted playsinline></video>

<script>
document.addEventListener("DOMContentLoaded", function () {

const questionBank = {

  able_bodied_seaman: [

    {
      q: "What does the helm order “Midships” mean?",
      opts: [
        "Turn the wheel fully to port",
        "Keep the ship steady on course",
        "Bring the rudder to zero position",
        "Stop the steering gear"
      ],
      ans: 2
    },

    {
      q: "Which is the primary duty of a lookout?",
      opts: [
        "Leave bridge periodically",
        "Maintain lookout by sight, hearing & all available means",
        "Follow daylight procedures",
        "Depend only on radar"
      ],
      ans: 1
    }

  ]

};

let questions = [];
let answers = [];
let cur = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;
let totalTime = 3600;
let timerInterval;
let pingInterval;
let submitted = false;
let user = null;
let warningCount = 0;

function el(id) {
  return document.getElementById(id);
}

function normalizeRank(raw) {
  return (raw || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function getAuthHeaders() {
  return {
    "Content-Type": "application/json",
    "x-session-token": user.token || "",
    "x-user-id": String(user.id || "")
  };
}
async function startCamera() {

  try {

    // Load models
    await faceapi.nets.tinyFaceDetector.loadFromUri(
      "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model"
    );

    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(
      "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model"
    );

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        width: 640,
        height: 480,
        facingMode: "user"
      },
      audio: false
    });

    const video = el("camPreview");

    video.srcObject = stream;
await video.play();
  video.width = 180;
video.height = 120;
    // Overlay canvas
    const canvas = document.createElement("canvas");

    canvas.id = "faceOverlay";
    canvas.width = 180;
canvas.height = 120;

    document.body.appendChild(canvas);

    const displaySize = {
      width: 180,
      height: 120
    };

    faceapi.matchDimensions(canvas, displaySize);
canvas.style.display = "block";
video.onloadedmetadata = () => {
      const ctx = canvas.getContext("2d");

      let noFaceCount = 0;
      let multiFaceCount = 0;
      let awayCount = 0;
 
      async function detectFace() {

        if (submitted) return;

        const detections =
  await faceapi
    .detectAllFaces(
      video,
      new faceapi.TinyFaceDetectorOptions({
        inputSize: 224,
        scoreThreshold: 0.5
      })
    )
    .withFaceLandmarks(
      true
    );
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // TOP STATUS BAR
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, 180, 24);

        // NO FACE
        if (detections.length === 0) {

          noFaceCount++;

          ctx.fillStyle = "red";
          ctx.font = "bold 13px Arial";
          ctx.fillText("NO FACE DETECTED", 8, 16);

          if (noFaceCount >= 40) {

            alert("Face not detected.");

            submit();

            return;
          }

        }

        // MULTIPLE FACE
        else if (detections.length > 1) {

          multiFaceCount++;

          ctx.fillStyle = "yellow";
          ctx.font = "bold 13px Arial";
          ctx.fillText("MULTIPLE FACES", 8, 16);

          if (multiFaceCount >= 20) {

            alert("Multiple persons detected.");

            submit();

            return;
          }

        }

        // SINGLE FACE
        else {

          noFaceCount = 0;
          multiFaceCount = 0;

          const resized =
            faceapi.resizeResults(detections, displaySize);

          faceapi.draw.drawDetections(canvas, resized);

          const detection = resized[0];

          const box = detection.detection.box;

          // FACE CENTER CHECK
          const centerX = box.x + box.width / 2;
          const centerY = box.y + box.height / 2;

          const faceCentered =
            centerX > 50 &&
            centerX < 130 &&
            centerY > 25 &&
            centerY < 95;

          // LANDMARKS
          const landmarks = detection.landmarks;

          faceapi.draw.drawFaceLandmarks(canvas, resized);

          // LEFT + RIGHT EYE
          const leftEye = landmarks.getLeftEye();
          const rightEye = landmarks.getRightEye();

          // Approximate gaze
          const eyeAvgX =
            [...leftEye, ...rightEye]
              .reduce((a, p) => a + p.x, 0) /
            (leftEye.length + rightEye.length);

          // FACE DIRECTION
          let direction = "CENTER";

          if (eyeAvgX < centerX - 10) {
            direction = "LEFT";
          }
          else if (eyeAvgX > centerX + 10) {
            direction = "RIGHT";
          }

          // STATUS DISPLAY
          ctx.fillStyle = "#00ff00";
          ctx.font = "bold 12px Arial";
          ctx.fillText("FACE VERIFIED", 8, 16);

          // DIRECTION BOX
          ctx.fillStyle = "rgba(0,0,0,0.7)";
          ctx.fillRect(0, 95, 180, 25);

          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 12px Arial";
          ctx.fillText(
            "LOOKING: " + direction,
            8,
            112
          );

          // FACE MOVED AWAY
          if (!faceCentered) {

            awayCount++;

            ctx.strokeStyle = "red";
            ctx.lineWidth = 3;

            ctx.strokeRect(
              box.x,
              box.y,
              box.width,
              box.height
            );

            if (awayCount >= 50) {

              alert("Please face the screen.");

              submit();

              return;
            }

          } else {

            awayCount = 0;

          }

        }

        requestAnimationFrame(detectFace);

      }

      detectFace();

    });
  } catch (err) {

    console.error(err);

    alert("Camera permission required.");

  }

}
function startPing() {

  pingInterval = setInterval(async () => {

    if (submitted) return;

    try {

      // const res = await fetch("http://localhost:3005/api/ping", {
              await fetch("/api/ping", {

        headers: getAuthHeaders()
      });

      if (res.status === 401) {

        clearInterval(timerInterval);
        clearInterval(pingInterval);

        el("kickedOverlay").classList.add("show");

      }

    } catch (e) {

      console.warn(e.message);

    }

  }, 10000);

}

function init() {

  user = JSON.parse(sessionStorage.getItem("examUser"));

  if (!user || !user.id || !user.token) {

    alert("No valid session found");

    goToLogin();

    return;

  }

  const rankKey = normalizeRank(user.rank);

  const rankMap = {
    able_boiled_seamnan: "able_bodied_seaman",
    able_bodied_seaman: "able_bodied_seaman",
    able_seaman: "able_bodied_seaman",
    ab: "able_bodied_seaman",
    abs: "able_bodied_seaman",
    ab_seaman: "able_bodied_seaman"
  };

  const finalRank = rankMap[rankKey] || rankKey;

  questions = questionBank[finalRank] || [];

  if (!questions.length) {

    el("qtxt").textContent =
      `No questions found for rank: ${user.rank}`;

    return;

  }

  answers = new Array(questions.length).fill(null);

  renderQ();

  startTimer();

  startPing();

  startCamera();

  // Fullscreen
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

}

function renderQ() {

  const q = questions[cur];

  if (!q) {

    el("qtxt").textContent = "Question not found";

    return;

  }

  el("qtxt").textContent =
    `Q${cur + 1} of ${questions.length}: ${q.q}`;

  el("progressFill").style.width =
    ((cur + 1) / questions.length * 100) + "%";

  const box = el("optsEl");

  box.innerHTML = "";

  (q.opts || []).forEach((opt, i) => {

    const div = document.createElement("div");

    div.className =
      "opt" + (answers[cur] === i ? " sel" : "");

    div.textContent = opt;

    div.onclick = () => {

      answers[cur] = i;

      renderQ();

    };

    box.appendChild(div);

  });

  if (cur === questions.length - 1) {

    el("submitBtn").style.display = "block";

  } else {

    el("submitBtn").style.display = "none";

  }

}

window.go = function(d) {

  const n = cur + d;

  if (n >= 0 && n < questions.length) {

    cur = n;

    renderQ();

  }

};

function startTimer() {

  updateTimerDisplay();

  timerInterval = setInterval(() => {

    totalTime--;

    updateTimerDisplay();

    if (totalTime <= 60) {
      el("timerBox").classList.add("warning");
    }

    if (totalTime <= 0) {

      clearInterval(timerInterval);

      submit();

    }

  }, 1000);

}

function updateTimerDisplay() {

  const m =
    String(Math.floor(totalTime / 60)).padStart(2, "0");

  const s =
    String(totalTime % 60).padStart(2, "0");

  el("timeLeft").textContent = `${m}:${s}`;

}

window.confirmSubmit = function() {

  if (confirm("Submit exam?")) {

    submit();

  }

};

async function submit() {

  if (submitted) return;

  submitted = true;

  clearInterval(timerInterval);

  clearInterval(pingInterval);

  correct = 0;
  wrong = 0;
  skipped = 0;

  questions.forEach((q, i) => {

    if (answers[i] === null) {

      skipped++;

    } else if (answers[i] === q.ans) {

      correct++;

    } else {

      wrong++;

    }

  });

  const score =
    Math.round((correct / questions.length) * 100);

  const name = user.name || "N/A";

  const rank = user.rank || "N/A";

  try {

    // await fetch("http://localhost:3005/api/result", {
          await fetch("/api/result", {


      method: "POST",

      headers: getAuthHeaders(),

      body: JSON.stringify({

        user_id: user.id,
        user_name: name,
        rank,
        score,
        correct,
        wrong,
        skipped

      })

    });

  } catch (err) {

    console.error(err);

  }

  el("examScreen").style.display = "none";

  el("res").style.display = "block";

  el("rname").textContent = name;

  el("rrank").textContent = rank;

  el("rcorrect").textContent = correct;

  el("rwrong").textContent = wrong;

  el("rskipped").textContent = skipped;

  const circle = el("scoreCircle");

  circle.textContent = score + "%";

  circle.style.background =
    score >= 50 ? "#22c55e" : "#ef4444";

  el("rmsg").textContent =
    score >= 50
      ? "🎉 Congratulations! You PASSED."
      : "❌ You FAILED.";

  sessionStorage.removeItem("examUser");

}

// Prevent fullscreen exit
document.addEventListener("fullscreenchange", () => {

  if (!document.fullscreenElement && !submitted) {

    alert("Fullscreen required.");

    document.documentElement.requestFullscreen();

  }

});

// Disable right click
document.addEventListener("contextmenu", e => {
  e.preventDefault();
});

// Disable copy
document.addEventListener("copy", e => {
  e.preventDefault();
});

// Disable paste
document.addEventListener("paste", e => {
  e.preventDefault();
});

// Disable cut
document.addEventListener("cut", e => {
  e.preventDefault();
});

// Detect tab switching
document.addEventListener("visibilitychange", () => {

  if (document.hidden && !submitted) {

    warningCount++;

    alert(`Warning ${warningCount}/3`);

    if (warningCount >= 3) {

      alert("Exam auto submitted.");

      submit();

    }

  }

});

// Block shortcuts
document.addEventListener("keydown", function(e) {

  if (e.key === "F12") {
    e.preventDefault();
  }

  if (e.ctrlKey && e.shiftKey && e.key === "I") {
    e.preventDefault();
  }

  if (e.ctrlKey && e.key === "u") {
    e.preventDefault();
  }

  if (e.ctrlKey && e.key === "c") {
    e.preventDefault();
  }

});

init();

});
</script>

</body>
</html>
